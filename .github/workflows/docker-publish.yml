name: Test, build and publish Docker image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: entregable-4-flask

jobs:
  test-build-publish:
    name: Test, build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.15"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build Docker image
        run: docker build -t "${IMAGE_NAME}:local" .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and publish Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
          docker tag "${IMAGE_NAME}:local" "${IMAGE}:latest"
          docker tag "${IMAGE_NAME}:local" "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${GITHUB_SHA}"
